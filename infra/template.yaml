AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Newslet - daily RSS newsletter app (Lambdas + HttpApi + DynamoDB + SES inbound)

Parameters:
  MailDomain:
    Type: String
    Default: ''
    Description: >-
      Domain (or subdomain) SES receives newsletter mail on, e.g.
      inbox.example.com. Leave empty to deploy the inbound infrastructure
      without activating SES reception — wire up the domain (verify it in SES,
      point its MX at SES) and redeploy with this set to start receiving.

  SiteDomain:
    Type: String
    Default: ''
    Description: >-
      Apex domain the web UI is served at, e.g. dailyscoop.email. Also used to
      build the links inside the daily email. Leave empty to serve only on the
      execute-api URL. Set (with SiteHostedZoneId) in samconfig to attach the
      custom domain. www.<SiteDomain> is also provisioned and 301s to the apex.

  SiteHostedZoneId:
    Type: String
    Default: ''
    Description: >-
      Route 53 hosted zone ID for SiteDomain. Used to auto-validate the ACM
      certificate via DNS and to create the alias records. Required whenever
      SiteDomain is set.

Conditions:
  # The SES receipt-rule resources are only created once a mail domain is
  # supplied; everything else (bucket, tables, inbound Lambda) deploys either
  # way so the code path is in place and just needs DNS to go live.
  HasMailDomain: !Not [!Equals [!Ref MailDomain, '']]
  # The custom-domain resources (cert, API domains, alias records) deploy only
  # when a site domain is configured; without it the app stays on execute-api.
  HasSiteDomain: !Not [!Equals [!Ref SiteDomain, '']]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    # Point at src/ so the newslet package lands at the zip root —
    # Lambda's handler resolution can then find newslet.handlers.*.
    # requirements.txt lives alongside the package in src/.
    CodeUri: ../src

Resources:

  # ---------- HTTP API ----------
  # Uses the $default stage so URLs have no /<stage>/ prefix.
  Api:
    Type: AWS::Serverless::HttpApi

  # ---------- Custom domain (web UI at https://<SiteDomain>) ----------
  # All of this is created only when SiteDomain is set. The ACM cert is
  # DNS-validated automatically because the zone is in Route 53 in this
  # account, so the stack does not block waiting on manual record creation.
  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasSiteDomain
    Properties:
      DomainName: !Ref SiteDomain
      SubjectAlternativeNames:
        - !Sub 'www.${SiteDomain}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref SiteDomain
          HostedZoneId: !Ref SiteHostedZoneId
        - DomainName: !Sub 'www.${SiteDomain}'
          HostedZoneId: !Ref SiteHostedZoneId

  # Apex: custom domain -> $default stage, plus a Route 53 alias at the apex.
  SiteApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasSiteDomain
    Properties:
      DomainName: !Ref SiteDomain
      DomainNameConfigurations:
        - CertificateArn: !Ref SiteCertificate
          EndpointType: REGIONAL

  SiteApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasSiteDomain
    Properties:
      DomainName: !Ref SiteApiDomain
      ApiId: !Ref Api
      Stage: $default

  SiteDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasSiteDomain
    Properties:
      HostedZoneId: !Ref SiteHostedZoneId
      Name: !Ref SiteDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt SiteApiDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  # www: terminates TLS on the same API; the web app 301s it to the apex
  # (see _CanonicalHostMiddleware in handlers/web.py).
  SiteApiDomainWww:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasSiteDomain
    Properties:
      DomainName: !Sub 'www.${SiteDomain}'
      DomainNameConfigurations:
        - CertificateArn: !Ref SiteCertificate
          EndpointType: REGIONAL

  SiteApiMappingWww:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasSiteDomain
    Properties:
      DomainName: !Ref SiteApiDomainWww
      ApiId: !Ref Api
      Stage: $default

  SiteDnsRecordWww:
    Type: AWS::Route53::RecordSet
    Condition: HasSiteDomain
    Properties:
      HostedZoneId: !Ref SiteHostedZoneId
      Name: !Sub 'www.${SiteDomain}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteApiDomainWww.RegionalDomainName
        HostedZoneId: !GetAtt SiteApiDomainWww.RegionalHostedZoneId
        EvaluateTargetHealth: false

  # ---------- DynamoDB Tables ----------
  FeedsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: url
          AttributeType: S
      KeySchema:
        - AttributeName: url
          KeyType: HASH

  ProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  SeenArticlesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: url_hash
          AttributeType: S
      KeySchema:
        - AttributeName: url_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  IssuesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: article_url
          AttributeType: S
        - AttributeName: issue_date
          AttributeType: S
        - AttributeName: bucket
          AttributeType: S
        - AttributeName: ts
          AttributeType: S
      # PK = (article_url, issue_date) so a +/- click on the same article
      # in the same issue overwrites the previous vote rather than piling
      # up contradictory rows for Claude to see.
      KeySchema:
        - AttributeName: article_url
          KeyType: HASH
        - AttributeName: issue_date
          KeyType: RANGE
      # GSI gives chronological "most-recent" reads without a scan.
      # bucket is the year (e.g. "2026") to avoid a single hot
      # partition; the query side joins the current + previous year.
      GlobalSecondaryIndexes:
        - IndexName: feedback-by-ts
          KeySchema:
            - AttributeName: bucket
              KeyType: HASH
            - AttributeName: ts
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: address
          AttributeType: S
      KeySchema:
        - AttributeName: address
          KeyType: HASH

  InboxTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: message_id
          AttributeType: S
        - AttributeName: bucket
          AttributeType: S
        - AttributeName: received_at
          AttributeType: S
      KeySchema:
        - AttributeName: message_id
          KeyType: HASH
      # GSI gives a "last 24h of received newsletters" range read without a
      # scan; bucket is the year (mirrors FeedbackTable) to avoid a hot
      # partition. Rows carry a 30d TTL on expires_at.
      GlobalSecondaryIndexes:
        - IndexName: inbox-by-ts
          KeySchema:
            - AttributeName: bucket
              KeyType: HASH
            - AttributeName: received_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # ---------- Inbound email (SES -> S3 -> Lambda) ----------
  InboundEmailBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Raw inbound MIME is transient: SES writes it, the inbound Lambda reads
      # it once. Expire objects after 30d so the bucket can't grow forever.
      LifecycleConfiguration:
        Rules:
          - Id: expire-raw-email
            Status: Enabled
            ExpirationInDays: 30
            Prefix: inbound/

  InboundEmailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InboundEmailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # SES's receipt-rule S3 action needs PutObject; scope it to this
          # account so another account's SES can't write into the bucket.
          - Sid: AllowSESPuts
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${InboundEmailBucket}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # ---------- Lambda Functions ----------
  DigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: newslet.handlers.digest.handler
      # Explicit, deterministic name so WebFunction can reference it by
      # string (not !Ref) for the "send now" invoke — a !Ref would create
      # a circular dependency (Web -> Digest -> Api -> Web).
      FunctionName: !Sub '${AWS::StackName}-digest'
      Timeout: 300
      MemorySize: 1024
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfileTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SeenArticlesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IssuesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        # The digest folds subscribed-newsletter links (stored by the inbound
        # Lambda) into its ranking pool, so it reads the inbox table.
        - DynamoDBCrudPolicy:
            TableName: !Ref InboxTable
        # Secrets (anthropic/resend keys, admin token, signing key) are
        # SecureString params under /newslet/*. CloudFormation's ssm:
        # dynamic ref refuses SecureString and ssm-secure: isn't
        # supported for Lambda env vars, so the handlers fetch them at
        # cold start. kms:Decrypt is needed for the default SSM key.
        - SSMParameterReadPolicy:
            ParameterName: newslet/*
        - Statement:
            - Effect: Allow
              Action: kms:Decrypt
              Resource: '*'
              Condition:
                StringEquals:
                  kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'
      Environment:
        Variables:
          TABLE_FEEDS: !Ref FeedsTable
          TABLE_PROFILE: !Ref ProfileTable
          TABLE_SEEN: !Ref SeenArticlesTable
          TABLE_ISSUES: !Ref IssuesTable
          TABLE_FEEDBACK: !Ref FeedbackTable
          TABLE_INBOX: !Ref InboxTable
          FROM_EMAIL: !Sub '{{resolve:ssm:/newslet/from-email}}'
          TO_EMAIL: !Sub '{{resolve:ssm:/newslet/to-email}}'
          # Email links use the custom domain when configured, else the
          # raw execute-api URL. (The web Lambda derives its base URL from
          # the request instead — see handlers/web.py — to avoid a cycle.)
          PUBLIC_BASE_URL: !If
            - HasSiteDomain
            - !Sub 'https://${SiteDomain}'
            - !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com'
          CLAUDE_MODEL: !Sub '{{resolve:ssm:/newslet/claude-model}}'
      Events:
        # Rebuild the standalone web homepage (the "home" aggregation) 15
        # minutes before the email goes out, so it is fresh and waiting when
        # the email's "Open newslet" link is clicked. Input is delivered as
        # the Lambda event, routing to digest._run_home.
        HomeRefreshSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(45 9 * * ? *)
            Description: Rebuild the web homepage daily at 09:45 UTC (before the email)
            Input: '{"home": true}'
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 10 * * ? *)
            Description: Trigger digest generation daily at 10:00 UTC

  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: newslet.handlers.web.handler
      Timeout: 30
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfileTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IssuesTable
        # The admin UI creates/lists/deletes newsletter subscriptions.
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
        - SSMParameterReadPolicy:
            ParameterName: newslet/*
        # Lets the admin "send now" button async-invoke the digest Lambda.
        # Named by string (not !Ref) to avoid a circular dependency — see
        # DigestFunction.FunctionName.
        - LambdaInvokePolicy:
            FunctionName: !Sub '${AWS::StackName}-digest'
        - Statement:
            - Effect: Allow
              Action: kms:Decrypt
              Resource: '*'
              Condition:
                StringEquals:
                  kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'
      Environment:
        # PUBLIC_BASE_URL is intentionally NOT set here. If we referenced
        # !Sub '...${Api}...' on this function, CloudFormation sees a
        # circular dependency (Api integrations point at WebFunction via
        # the Events block, and the env var points back at Api). The
        # web handler computes its base URL from request.base_url at
        # runtime instead.
        Variables:
          TABLE_FEEDS: !Ref FeedsTable
          TABLE_PROFILE: !Ref ProfileTable
          TABLE_SEEN: !Ref SeenArticlesTable
          TABLE_ISSUES: !Ref IssuesTable
          TABLE_FEEDBACK: !Ref FeedbackTable
          TABLE_SUBSCRIPTIONS: !Ref SubscriptionsTable
          # Lets the admin UI mint addresses under the right domain (and grey
          # out the form when no domain is configured yet).
          MAIL_DOMAIN: !Ref MailDomain
          FROM_EMAIL: !Sub '{{resolve:ssm:/newslet/from-email}}'
          TO_EMAIL: !Sub '{{resolve:ssm:/newslet/to-email}}'
          CLAUDE_MODEL: !Sub '{{resolve:ssm:/newslet/claude-model}}'
          # So /api/send-now knows which function to invoke. String (not
          # !Ref) to avoid a circular dependency — see DigestFunction.
          DIGEST_FUNCTION_NAME: !Sub '${AWS::StackName}-digest'
      Events:
        RootRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: ANY
            Path: /
        ProxyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: ANY
            Path: /{proxy+}

  # Receives newsletter emails: SES drops raw MIME in S3 and invokes this
  # function, which parses the mail, matches it to a subscription, auto-confirms
  # double opt-ins, and stores extracted links for the digest's ranking pool.
  InboundFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: newslet.handlers.inbound.handler
      FunctionName: !Sub '${AWS::StackName}-inbound'
      Timeout: 60
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InboxTable
        - S3ReadPolicy:
            BucketName: !Ref InboundEmailBucket
        - SSMParameterReadPolicy:
            ParameterName: newslet/*
        - Statement:
            - Effect: Allow
              Action: kms:Decrypt
              Resource: '*'
              Condition:
                StringEquals:
                  kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'
      Environment:
        Variables:
          TABLE_SUBSCRIPTIONS: !Ref SubscriptionsTable
          TABLE_INBOX: !Ref InboxTable
          INBOX_BUCKET: !Ref InboundEmailBucket
          MAIL_DOMAIN: !Ref MailDomain
          # settings() eagerly resolves all config (incl. the SSM secrets) at
          # cold start, so the inbound function needs the same from/to/model
          # values even though it never sends mail.
          FROM_EMAIL: !Sub '{{resolve:ssm:/newslet/from-email}}'
          TO_EMAIL: !Sub '{{resolve:ssm:/newslet/to-email}}'
          CLAUDE_MODEL: !Sub '{{resolve:ssm:/newslet/claude-model}}'

  # Allows SES to invoke the inbound function (the receipt rule's Lambda action).
  InboundFunctionSesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InboundFunction
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ---------- SES inbound receipt rules (only when a domain is configured) ----------
  # NOTE: CloudFormation can create a receipt rule set but cannot mark it the
  # *active* one. After deploy, run:
  #   aws ses set-active-receipt-rule-set --rule-set-name <StackName>-inbound
  # (and verify the domain + point its MX at inbound-smtp.<region>.amazonaws.com).
  InboundRuleSet:
    Type: AWS::SES::ReceiptRuleSet
    Condition: HasMailDomain
    Properties:
      RuleSetName: !Sub '${AWS::StackName}-inbound'

  InboundReceiptRule:
    Type: AWS::SES::ReceiptRule
    Condition: HasMailDomain
    # The S3 action fails unless the bucket policy and the SES invoke
    # permission already exist.
    DependsOn:
      - InboundEmailBucketPolicy
      - InboundFunctionSesPermission
    Properties:
      RuleSetName: !Ref InboundRuleSet
      Rule:
        Name: store-and-process
        Enabled: true
        ScanEnabled: true
        TlsPolicy: Optional
        # Catch-all on the domain: every generated address (n-xxxx@domain)
        # routes here, and the Lambda matches the recipient to a subscription.
        Recipients:
          - !Ref MailDomain
        Actions:
          # Order matters: store the raw message first, then invoke the Lambda
          # (which reads it back from S3 by messageId).
          - S3Action:
              BucketName: !Ref InboundEmailBucket
              ObjectKeyPrefix: inbound/
          - LambdaAction:
              FunctionArn: !GetAtt InboundFunction.Arn
              InvocationType: Event

Outputs:
  ApiUrl:
    Description: HTTP API invoke URL
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com'
  SiteUrl:
    Condition: HasSiteDomain
    Description: Public URL of the web UI on the custom domain
    Value: !Sub 'https://${SiteDomain}'
  DigestFunctionName:
    Description: Name of the digest Lambda function
    Value: !Ref DigestFunction
  WebFunctionName:
    Description: Name of the web Lambda function
    Value: !Ref WebFunction
  InboundFunctionName:
    Description: Name of the inbound newsletter Lambda function
    Value: !Ref InboundFunction
  InboundEmailBucketName:
    Description: S3 bucket SES writes raw inbound newsletter mail to
    Value: !Ref InboundEmailBucket
  MailDomain:
    Description: Domain newsletter addresses are generated under (empty if unset)
    Value: !Ref MailDomain
