name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:   # manual "Run workflow" button; pick the branch in the UI

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts
      - name: Pytest
        run: pytest -q

  deploy:
    # Deploy only from main, whether triggered by:
    #   - a push to main (PRs merged via "Squash and merge" land as a push to
    #     main, which this catches; PR events themselves never deploy), or
    #   - a manual "Run workflow" in the Actions UI with main selected
    #     (workflow_dispatch) — handy for re-deploying without a new commit.
    # Selecting any non-main branch runs the tests but skips the deploy, so a
    # manual dispatch can't push unreviewed branch code to production.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        working-directory: ./infra
        run: sam build

      - name: SAM deploy
        working-directory: ./infra
        run: |
          sam deploy \
            --stack-name newslet \
            --region us-east-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM