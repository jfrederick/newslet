# OpenCodeReview - GitHub Actions PR Auto-Review
#
# Automatically reviews pull requests using OpenCodeReview and posts
# review comments directly on the PR.
#
# Triggers:
#   - PR opened (pull_request). NOTE: re-review on later pushes is
#     comment-driven, not automatic on `synchronize`. Re-run a review by
#     commenting '/open-code-review' on the PR.
#   - A trusted user (OWNER/MEMBER/COLLABORATOR) comments
#     '/open-code-review' or '@open-code-review' on a PR.
#
# Security note: this uses `pull_request` (not `pull_request_target`), so
# secrets are NOT exposed to PRs from forks. Fork PRs are therefore not
# auto-reviewed; only branches pushed to this repository are.
#
# Required secrets:
#   OCR_LLM_URL          - LLM API endpoint (e.g. https://api.openai.com/v1/chat/completions)
#   OCR_LLM_AUTH_TOKEN   - Authentication token for the LLM API
#
# Optional secrets:
#   OCR_LLM_MODEL          - Model name (default: gpt-4o)
#   OCR_LLM_USE_ANTHROPIC  - Set to 'true' when using Anthropic/Claude models
#
# Note: GITHUB_TOKEN is automatically provided by GitHub Actions.

name: OpenCodeReview PR Review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Hard ceiling so a stalled review can't run forever.
    # Run on PR opened, or on a trigger comment from a trusted author.
    # The author_association gate stops arbitrary accounts from launching
    # secret-backed jobs via a comment.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (startsWith(github.event.comment.body, '/open-code-review') ||
         startsWith(github.event.comment.body, '@open-code-review')))
    steps:
      - name: Get PR context
        id: pr-context
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // For issue_comment events, look up the PR the comment is on.
            const prNumber = context.issue.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('base_ref', pullRequest.base.ref);
            core.setOutput('head_ref', pullRequest.head.ref);
            core.setOutput('head_sha', pullRequest.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for merge-base diff.
          ref: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}

      - name: Fetch PR head ref (ensures the head commit is available)
        run: git fetch origin pull/${{ github.event.pull_request.number || github.event.issue.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCodeReview
        run: npm install -g @alibaba-group/open-code-review

      - name: Configure OCR (non-credential settings)
        run: |
          # Credentials are passed as env vars on the review step below
          # (OCR's highest-precedence source). Only non-credential settings
          # are written to config here. Skip optional values when empty so
          # they can't clobber OCR's own defaults.
          if [ -n "${{ secrets.OCR_LLM_USE_ANTHROPIC }}" ]; then
            ocr config set llm.use_anthropic "${{ secrets.OCR_LLM_USE_ANTHROPIC }}"
          fi
          ocr config set llm.extra_body '{"thinking": {"type": "disabled"}}'

      - name: Run OpenCodeReview
        id: review
        env:
          # OCR's native credential env vars (highest precedence).
          # Note: the token var is OCR_LLM_TOKEN, not OCR_LLM_AUTH_TOKEN.
          OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
        run: |
          # Fail fast with an actionable message instead of OCR's cryptic
          # "no valid LLM endpoint" error when secrets are missing/empty
          # (e.g. a fork PR, which never receives secrets).
          if [ -z "$OCR_LLM_URL" ] || [ -z "$OCR_LLM_TOKEN" ]; then
            echo "::error::OCR_LLM_URL / OCR_LLM_TOKEN are empty. Check the repo secret names (OCR_LLM_URL, OCR_LLM_AUTH_TOKEN); fork PRs do not receive secrets." >&2
            exit 1
          fi

          # Base ref / head SHA differ between PR and comment triggers.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ steps.pr-context.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          fi

          echo "Reviewing ${HEAD_SHA} against origin/${BASE_REF}"

          # --audience agent keeps progress chatter off stdout so the
          #   redirected file is pure JSON for the parse step below.
          # stdout -> JSON file; stderr is streamed live to the console AND
          #   saved (via tee) so progress/errors are visible in real time
          #   instead of a blank, "still running" log.
          # `timeout` self-aborts before the job's hard ceiling.
          # Raise --concurrency if large diffs review too slowly.
          timeout 12m ocr review \
            --from "origin/${BASE_REF}" \
            --to "${HEAD_SHA}" \
            --format json \
            --audience agent \
            --concurrency 4 \
            > /tmp/ocr-result.json \
            2> >(tee /tmp/ocr-stderr.log >&2) \
            || echo "::warning::ocr review exited non-zero (code $?) — see stderr above"

          echo "----- ocr-result.json -----"
          cat /tmp/ocr-result.json || true

      - name: Post review comments to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '/tmp/ocr-result.json';

            // Read OCR output.
            let result;
            try {
              const raw = fs.readFileSync(path, 'utf8');
              result = JSON.parse(raw);
            } catch (e) {
              console.log('Failed to parse OCR output:', e.message);
              // Post a simple comment if parsing fails.
              let stderr = '';
              try { stderr = fs.readFileSync('/tmp/ocr-stderr.log', 'utf8').trim(); } catch (_) {}
              if (stderr) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `⚠️ **OpenCodeReview** encountered an error:\n\`\`\`\n${stderr}\n\`\`\``
                });
              }
              return;
            }

            const comments = result.comments || [];
            const warnings = result.warnings || [];

            // If no comments, post a summary.
            if (comments.length === 0) {
              const message = result.message || 'No comments generated. Looks good to me.';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ **OpenCodeReview**: ${message}`
              });
              return;
            }

            // Prepare PR review with inline comments.
            const prNumber = context.issue.number;
            let commitSha;

            // Get commit SHA from event context.
            if (context.eventName === 'pull_request') {
              commitSha = context.payload.pull_request.head.sha;
            } else {
              // For comment events, fetch the PR.
              const { data: pullRequest } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              commitSha = pullRequest.head.sha;
            }

            // Build review comments array for the PR review API.
            // Only inline comments with line info can be posted via createReview.
            const reviewComments = [];
            const commentsWithoutLine = [];

            for (const comment of comments) {
              const body = formatComment(comment);

              // Inline comment requires valid line info (line >= 1).
              const hasValidLine = (comment.start_line >= 1) || (comment.end_line >= 1);
              if (!hasValidLine) {
                commentsWithoutLine.push({ comment, body });
                continue;
              }

              const reviewComment = {
                path: comment.path,
                body: body
              };

              // Use a line range if available.
              if (comment.start_line >= 1 && comment.end_line >= 1 && comment.start_line !== comment.end_line) {
                reviewComment.start_line = comment.start_line;
                reviewComment.line = comment.end_line;
                reviewComment.start_side = 'RIGHT';
                reviewComment.side = 'RIGHT';
              } else if (comment.end_line >= 1) {
                reviewComment.line = comment.end_line;
                reviewComment.side = 'RIGHT';
              } else if (comment.start_line >= 1) {
                reviewComment.line = comment.start_line;
                reviewComment.side = 'RIGHT';
              }

              reviewComments.push(reviewComment);
            }

            // Submit as a single PR review with all comments.
            const totalCount = comments.length;
            const inlineCount = reviewComments.length;
            const summaryCount = commentsWithoutLine.length;
            let summaryBody = `🔍 **OpenCodeReview** found **${totalCount}** issue(s) in this PR.`;
            if (totalCount > 0) {
              summaryBody += `\n- ✅ ${inlineCount} posted as inline comment(s)`;
              summaryBody += `\n- 📝 ${summaryCount} posted as summary (missing line info)`;
            }
            if (warnings.length > 0) {
              summaryBody += `\n\n⚠️ ${warnings.length} warning(s) occurred during review.`;
            }

            // Add comments without line info to the summary body.
            for (const { comment, body } of commentsWithoutLine) {
              summaryBody += '\n\n---\n\n';
              summaryBody += formatCommentMarkdown(comment);
            }

            // Statistics tracking.
            let successCount = 0;
            let failedCount = 0;
            const failedComments = [];

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitSha,
                body: summaryBody,
                event: 'COMMENT',
                comments: reviewComments
              });
              successCount = reviewComments.length;
              console.log(`Successfully posted review with ${successCount} inline comments (${commentsWithoutLine.length} in summary)`);
            } catch (e) {
              console.log('Failed to post review with inline comments:', e.message);
              console.log('Falling back to posting comments individually...');

              // Fallback: post comments one by one.
              for (const reviewComment of reviewComments) {
                try {
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: commitSha,
                    body: '',
                    event: 'COMMENT',
                    comments: [reviewComment]
                  });
                  successCount++;
                  console.log(`Successfully posted comment for ${reviewComment.path}`);
                } catch (innerE) {
                  failedCount++;
                  failedComments.push({ comment: reviewComment, error: innerE.message });
                  console.log(`Failed to post comment for ${reviewComment.path}: ${innerE.message}`);
                }
              }

              // Post a summary comment with statistics.
              let finalBody = summaryBody;
              finalBody += `\n\n---\n\n📊 **Posting Statistics:**`;
              finalBody += `\n- ✅ Successfully posted: ${successCount} comment(s)`;
              if (failedCount > 0) {
                finalBody += `\n- ❌ Failed to post: ${failedCount} comment(s)`;
              }

              // Add failed comment details.
              if (failedComments.length > 0) {
                finalBody += '\n\n<details><summary>❌ Failed Comments Details</summary>\n\n';
                for (const { comment, error } of failedComments) {
                  finalBody += `- \`${comment.path}\`: ${error}\n`;
                }
                finalBody += '\n</details>';
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: finalBody
              });
            }

            function formatComment(comment) {
              let body = comment.content || '';

              // Add a code suggestion if available.
              if (comment.suggestion_code && comment.existing_code) {
                body += '\n\n**Suggestion:**\n';
                body += '```suggestion\n';
                body += comment.suggestion_code;
                if (!comment.suggestion_code.endsWith('\n')) body += '\n';
                body += '```';
              }

              return body;
            }

            function formatCommentMarkdown(comment) {
              let md = `### 📄 \`${comment.path}\``;
              if (comment.start_line && comment.end_line) {
                md += ` (L${comment.start_line}-L${comment.end_line})`;
              }
              md += '\n\n';
              md += comment.content || '';

              if (comment.suggestion_code && comment.existing_code) {
                md += '\n\n<details><summary>💡 Suggested Change</summary>\n\n';
                md += '**Before:**\n```\n' + comment.existing_code + '\n```\n\n';
                md += '**After:**\n```\n' + comment.suggestion_code + '\n```\n\n';
                md += '</details>';
              }

              return md;
            }
